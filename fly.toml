# fly.toml — Fly.io configuration for the Titan MD session generator
#
# Deploy with:
#   flyctl auth signup            # or `flyctl auth login` if you have an account
#   flyctl launch --copy-config --no-deploy
#   flyctl secrets set GITHUB_TOKEN=ghp_yourtokenhere
#   flyctl deploy
#
# The bot itself runs on Bot-Hosting.net (separate). This config only
# deploys the SESSION GENERATOR web service.

app = "titan-md-session"
primary_region = "fra"   # change to your closest region: fra, lax, sea, sjc, ord, etc.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"        # idle? stop the VM. Wakes on first request.
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"
